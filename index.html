<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Africhess</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      color: #e8e6e0;
      gap: 20px;
      padding: 20px;
    }

    h1 {
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: #888;
      text-transform: uppercase;
    }

    /* ── Tab navigation ── */
    .tabs {
      display: flex;
      gap: 0;
      border: 1px solid #333;
      border-radius: 2px;
      overflow: hidden;
    }
    .tab-btn {
      padding: 9px 28px;
      background: transparent;
      color: #666;
      border: none;
      border-right: 1px solid #333;
      font-size: 13px;
      font-family: 'Georgia', serif;
      letter-spacing: 0.12em;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .tab-btn:last-child { border-right: none; }
    .tab-btn:hover { color: #00ff9d; background: #1a1a1a; }
    .tab-btn.active { background: #00ff9d22; color: #00ff9d; }

    /* ── Panels ── */
    .panel { display: none; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
    .panel.active { display: flex; }

    /* ── Board ── */
    #board, #analysis-board { width: 480px; }

    .highlight-square {
      background: radial-gradient(circle, rgba(0,255,157,0.55) 25%, transparent 27%) !important;
    }
    .highlight-capture {
      background: radial-gradient(circle, transparent 55%, rgba(0,255,157,0.55) 57%) !important;
    }
    .highlight-selected { background: rgba(0,255,157,0.2) !important; }
    .highlight-best { background: rgba(0,255,157,0.35) !important; box-shadow: inset 0 0 0 3px #00ff9d88; }

    #status, #analysis-status {
      font-size: 16px;
      color: #aaa;
      letter-spacing: 0.05em;
      min-height: 24px;
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 10px 24px;
      background: transparent;
      color: #00ff9d;
      border: 1px solid #00ff9d;
      font-size: 14px;
      font-family: 'Georgia', serif;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }
    button:hover, button.active { background: #00ff9d; color: #111; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Analysis panel extras ── */
    .analysis-input-row {
      display: flex;
      gap: 10px;
      width: 480px;
    }
    #fen-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e8e6e0;
      padding: 10px 14px;
      font-size: 13px;
      font-family: monospace;
      border-radius: 2px;
      outline: none;
      transition: border-color 0.2s;
    }
    #fen-input:focus { border-color: #00ff9d55; }
    #fen-input::placeholder { color: #444; }

    /* API key row */
    .api-row {
      display: flex;
      gap: 10px;
      width: 480px;
      align-items: center;
    }
    #api-key-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e8e6e0;
      padding: 9px 14px;
      font-size: 13px;
      font-family: monospace;
      border-radius: 2px;
      outline: none;
      transition: border-color 0.2s;
    }
    #api-key-input:focus { border-color: #00ff9d55; }
    #api-key-input::placeholder { color: #444; }
    .api-label {
      font-size: 11px;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* Eval bar */
    .eval-bar-wrap {
      width: 480px;
      height: 6px;
      background: #222;
      border-radius: 3px;
      overflow: hidden;
    }
    .eval-bar-fill {
      height: 100%;
      width: 50%;
      background: #00ff9d;
      transition: width 0.6s ease;
      border-radius: 3px;
    }
    .eval-label {
      font-size: 12px;
      color: #555;
      letter-spacing: 0.08em;
      width: 480px;
      text-align: right;
    }

    /* Coach card */
    #coach-card {
      width: 480px;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-left: 3px solid #00ff9d44;
      border-radius: 2px;
      padding: 18px 20px;
      display: none;
      gap: 14px;
      flex-direction: column;
    }
    #coach-card.visible { display: flex; }

    .coach-section { display: flex; flex-direction: column; gap: 5px; }
    .coach-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #00ff9d88;
    }
    .coach-text {
      font-size: 14px;
      color: #ccc;
      line-height: 1.65;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #333;
      border-top-color: #00ff9d;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .best-move-badge {
      display: inline-block;
      background: #00ff9d18;
      border: 1px solid #00ff9d44;
      color: #00ff9d;
      font-family: monospace;
      font-size: 13px;
      padding: 2px 10px;
      border-radius: 2px;
      letter-spacing: 0.05em;
    }
    /* ── Candidate moves ── */
    .candidates-wrap {
      width: 480px;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 2px;
      padding: 12px 14px;
      display: none;
    }
    .candidates-wrap.visible { display: block; }
    .candidates-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 10px;
    }
    .candidate-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 0;
      border-bottom: 1px solid #1e1e1e;
    }
    .candidate-row:last-child { border-bottom: none; }
    .candidate-rank {
      font-size: 10px;
      color: #444;
      width: 16px;
      text-align: right;
      flex-shrink: 0;
    }
    .candidate-move {
      font-family: monospace;
      font-size: 14px;
      color: #00ff9d;
      width: 56px;
      flex-shrink: 0;
    }
    .candidate-bar-wrap {
      flex: 1;
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }
    .candidate-bar {
      height: 100%;
      background: #00ff9d;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .candidate-eval {
      font-family: monospace;
      font-size: 12px;
      color: #666;
      width: 48px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Captured pieces ── */
    .captured-bar {
      width: 480px;
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 22px;
      font-size: 18px;
      line-height: 1;
    }
    .captured-pieces { display: flex; flex-wrap: wrap; gap: 1px; }
    .material-score {
      font-size: 12px;
      font-family: monospace;
      color: #555;
      margin-left: 4px;
    }
    .material-score.ahead { color: #00ff9d; }
    /* ── Auth modal ── */
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      backdrop-filter: blur(4px);
    }
    .auth-overlay.active { display: flex !important; }

    .auth-card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-top: 2px solid #00ff9d;
      border-radius: 3px;
      padding: 36px 40px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .auth-title {
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #00ff9d;
      margin-bottom: 4px;
    }
    .auth-subtitle {
      font-size: 12px;
      color: #555;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .auth-input {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      color: #e8e6e0;
      padding: 11px 14px;
      font-size: 13px;
      font-family: monospace;
      border-radius: 2px;
      outline: none;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: #00ff9d55; }
    .auth-input::placeholder { color: #444; }

    .auth-btn {
      width: 100%;
      padding: 12px;
      background: #00ff9d;
      color: #111;
      border: none;
      font-size: 12px;
      font-family: 'Georgia', serif;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s;
    }
    .auth-btn:hover { background: #00cc7a; }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #333;
      font-size: 11px;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #2a2a2a;
    }

    .google-btn {
      width: 100%;
      padding: 11px;
      background: transparent;
      color: #aaa;
      border: 1px solid #2a2a2a;
      font-size: 12px;
      font-family: 'Georgia', serif;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .google-btn:hover { border-color: #555; color: #fff; }

    .auth-toggle {
      font-size: 11px;
      color: #555;
      text-align: center;
      letter-spacing: 0.05em;
    }
    .auth-toggle span {
      color: #00ff9d;
      cursor: pointer;
      text-decoration: underline;
    }
    .auth-error {
      font-size: 12px;
      color: #ff6b6b;
      text-align: center;
      min-height: 16px;
      letter-spacing: 0.04em;
    }
    .auth-close {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      color: #444;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
    }
    .auth-close:hover { color: #aaa; background: none; }

    /* ── User bar (top of play panel) ── */
    .user-bar {
      width: 480px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }
    .user-info {
      font-size: 11px;
      color: #555;
      letter-spacing: 0.08em;
      font-family: monospace;
    }
    .user-info span { color: #00ff9d; }
    .user-actions { display: flex; gap: 8px; }
    .user-actions button {
      padding: 5px 14px;
      font-size: 11px;
      letter-spacing: 0.08em;
    }
        @media (max-width: 600px) {
      #board, #analysis-board { width: calc(100vw - 32px); }
      .captured-bar, .user-bar, .candidates-wrap,
      .eval-bar-wrap, .eval-label, #coach-card { width: calc(100vw - 32px); }
      .tab-btn { padding: 9px 16px; font-size: 11px; }
      .controls { gap: 8px; }
      button { padding: 8px 14px; font-size: 12px; }
    }
  </style>
</head>
<body>

  <div class="nav-logo" style="display:flex;align-items:center;gap:10px;justify-content:center;">
    <img src="/logo.png" height="38" alt="AfriChess logo">
    <span style="font-size:22px;font-weight:400;letter-spacing:0.15em;color:#888;text-transform:uppercase;">Afri<span style="color:#00d98b">Chess</span></span>
  </div>

  <!-- Tab switcher -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('play')">Play</button>
    <button class="tab-btn" onclick="switchTab('analysis')">Analysis</button>
  </div>

  <!-- ══════════════════ PLAY PANEL ══════════════════ -->
  <div id="panel-play" class="panel active">
    <div id="status">Choose your color to begin.</div>
    <div class="controls">
      <button id="btn-white" onclick="startGame('white')">Play as White</button>
      <button id="btn-black" onclick="startGame('black')">Play as Black</button>
    </div>

    <!-- Opponent captured pieces (shown above board) -->
    <div class="captured-bar" id="captured-opponent">
      <div class="captured-pieces" id="pieces-opponent"></div>
      <span class="material-score" id="score-opponent"></span>
    </div>
    

    <div id="board"></div>

    <div class="user-bar">
      <div class="user-info" id="user-info">Not signed in</div>
      <div class="user-actions">
        <button onclick="openAuth()" id="btn-login">Sign In</button>
        <button onclick="goToHistory()" id="btn-history" style="display:none">My Games</button>
        <button onclick="signOut()" id="btn-signout" style="display:none">Sign Out</button>
      </div>
    </div>
    
    <!-- Player captured pieces (shown below board) -->
    <div class="captured-bar" id="captured-player">
      <div class="captured-pieces" id="pieces-player"></div>
      <span class="material-score" id="score-player"></span>
    </div>

    <div class="controls">
      <button onclick="resetGame()">New Game</button>
      <button onclick="if(board) board.flip()">Flip Board</button>
    </div>
  </div>

  <!-- ══════════════════ ANALYSIS PANEL ══════════════════ -->
  <div id="panel-analysis" class="panel">

    <!-- API key input -->
    <div class="api-row">
      <span class="api-label">API Key</span>
      <input id="api-key-input" type="password" placeholder="Your Africhess API key (required for coaching)" />
    </div>

    <!-- FEN input -->
    <div class="analysis-input-row">
      <input id="fen-input" type="text" placeholder="Paste FEN  —  or leave blank for starting position" />
      <button onclick="loadFen()">Load</button>
    </div>

    <div id="analysis-status">Paste a FEN and press Load, or click Analyse.</div>

    <div id="analysis-board"></div>

    <!-- Eval bar -->
    <div class="eval-bar-wrap">
      <div class="eval-bar-fill" id="eval-bar"></div>
    </div>
    <div class="eval-label" id="eval-label">—</div>

    <!-- Candidate moves -->
    <div class="candidates-wrap" id="candidates-wrap">
      <div class="candidates-label">Candidate Moves</div>
      <div id="candidates-list"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button onclick="analysePosition()">Analyse</button>
      <button onclick="getCoaching()" id="btn-coach">Coach Me</button>
      <button onclick="resetAnalysis()">Reset</button>
      <button onclick="if(analysisBoard) analysisBoard.flip()">Flip</button>
    </div>

    <!-- Coach card -->
    <div id="coach-card">
      <div class="coach-section">
        <span class="coach-label">Assessment</span>
        <span class="coach-text" id="c-assessment">—</span>
      </div>
      <div class="coach-section">
        <span class="coach-label">Best Move</span>
        <span class="coach-text" id="c-bestmove">—</span>
      </div>
      <div class="coach-section">
        <span class="coach-label">Plan</span>
        <span class="coach-text" id="c-plan">—</span>
      </div>
      <div class="coach-section">
        <span class="coach-label">Tip</span>
        <span class="coach-text" id="c-tip">—</span>
      </div>
    </div>

  </div><!-- /panel-analysis -->


<!-- ══════════════════ SCRIPTS ══════════════════ -->
<script>

  
const API_BASE = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
  ? 'http://127.0.0.1:8000'
  : 'https://' + location.hostname;

function renderCandidates(candidates) {
  if (!candidates || !candidates.length) return;
  var wrap = document.getElementById('candidates-wrap');
  var list = document.getElementById('candidates-list');
  if (!wrap || !list) return;
  wrap.classList.add('visible');
  list.innerHTML = '';
  var maxEval = Math.max.apply(null, candidates.map(function(c) { return Math.abs(c.eval_pawns); }));
  if (maxEval === 0) maxEval = 1;
  candidates.forEach(function(c, i) {
    var sign   = c.eval_pawns >= 0 ? '+' : '';
    var barPct = Math.min(100, (Math.abs(c.eval_pawns) / maxEval) * 100);
    var row    = document.createElement('div');
    row.className = 'candidate-row';
    row.innerHTML =
      '<span class="candidate-rank">' + (i+1) + '</span>' +
      '<span class="candidate-move">' + c.move + '</span>' +
      '<div class="candidate-bar-wrap"><div class="candidate-bar" style="width:' + barPct + '%"></div></div>' +
      '<span class="candidate-eval">' + sign + c.eval_pawns.toFixed(2) + '</span>';
    list.appendChild(row);
  });
}  

// ─── Tab switching ─────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  event.target.classList.add('active');

}

// ══════════════════════════════════════════════════════════════
//  PLAY MODE  (original code, untouched)
// ══════════════════════════════════════════════════════════════
var game = new Chess();
var board = null;
var playerColor = 'w';
var engineThinking = false;
var selectedSquare = null;
var gameStarted = false;
var moveHistory = []; 

function setStatus(msg) { document.getElementById('status').textContent = msg; }

function clearHighlights() {
  $('#board .square-55d63').removeClass('highlight-square highlight-capture highlight-selected');
}

function highlightMoves(square) {
  clearHighlights();
  var moves = game.moves({ square: square, verbose: true });
  if (!moves.length) return;
  $('#board .square-' + square).addClass('highlight-selected');
  moves.forEach(function(m) {
    var isCapture = !!game.get(m.to) || m.flags.indexOf('e') > -1;
    $('#board .square-' + m.to).addClass(isCapture ? 'highlight-capture' : 'highlight-square');
  });
}

function onDragStart(source, piece) {
  if (!gameStarted) return false;
  if (engineThinking || game.game_over()) return false;
  if (game.turn() !== playerColor) return false;
  if (playerColor === 'w' && piece.search(/^b/) !== -1) return false;
  if (playerColor === 'b' && piece.search(/^w/) !== -1) return false;
  highlightMoves(source);
  selectedSquare = source;
  return true;
}

function onDrop(source, target) {
  clearHighlights();
  selectedSquare = null;
  var move = game.move({ from: source, to: target, promotion: 'q' });
  if (move === null) return 'snapback';
  moveHistory.push(move.san);
  updateCapturedPieces();
  if (game.game_over()) { showResult(); return; }
  setStatus('Engine thinking...');
  engineThinking = true;
  setTimeout(getEngineMove, 150);
}

function onSnapEnd() { board.position(game.fen()); }

function onSquareClick(square) {
  if (!gameStarted || engineThinking || game.game_over()) return;
  if (game.turn() !== playerColor) return;
  var piece = game.get(square);
  if (piece && piece.color === playerColor) {
    highlightMoves(square);
    selectedSquare = square;
    return;
  }
  if (selectedSquare) {
    var move = game.move({ from: selectedSquare, to: square, promotion: 'q' });
    clearHighlights();
    selectedSquare = null;
    if (move === null) return;
    moveHistory.push(move.san);
    board.position(game.fen());
    if (game.game_over()) { showResult(); return; }
    setStatus('Engine thinking...');
    engineThinking = true;
    setTimeout(getEngineMove, 150);
  }
}

function getEngineMove() {
  fetch(API_BASE + '/move', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fen: game.fen(), think_time: 1.0 })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    // Always update board first
    if (data.fen) {
      // Get SAN before loading new position
      if (data.move) {
        var tempGame = new Chess(game.fen());
        var engineMove = tempGame.move({
          from: data.move.slice(0,2),
          to:   data.move.slice(2,4),
          promotion: data.move[4] || 'q'
        });
        if (engineMove) moveHistory.push(engineMove.san);
      }
      game.load(data.fen);
      board.position(data.fen);
      updateCapturedPieces();
    }
    renderCandidates(data.candidates);
    engineThinking = false;
    
    // Then check game over
    if (data.is_game_over) { 
      showResult(); 
      return; 
    }
    setStatus('Your move.');
  })
  .catch(function() {
    engineThinking = false;
    setStatus('Engine error — is the server running?');
  });
}

function showResult() {
  var resultText, resultKey;

  if (game.in_checkmate()) {
    if (game.turn() === playerColor) {
      resultText = 'Engine wins by checkmate.';
      resultKey  = playerColor === 'w' ? 'black' : 'white';
    } else {
      resultText = 'You win by checkmate!';
      resultKey  = playerColor === 'w' ? 'white' : 'black';
    }
  } else if (game.in_draw()) {
    resultText = 'Game drawn.';
    resultKey  = 'draw';
  } else {
    resultText = 'Game over.';
    resultKey  = 'draw';
  }

  setStatus(resultText);

  // Save game if user is signed in
  var pgn = buildPGN(game, resultKey);
  var colorName = playerColor === 'w' ? 'white' : 'black';
  saveGame(pgn, resultKey, colorName);
}

function startGame(color) {
  moveHistory = [];
  playerColor = (color === 'white') ? 'w' : 'b';

  engineThinking = false;
  selectedSquare = null;

  document.getElementById('btn-black').classList.toggle('active', color === 'black');

  });

  }
}

function resetGame() {
  if (!gameStarted) return;

}

function updateCapturedPieces() {
  var pieces = { w: {p:8,r:2,n:2,b:2,q:1}, b: {p:8,r:2,n:2,b:2,q:1} };
  var onBoard = { w: {p:0,r:0,n:0,b:0,q:0}, b: {p:0,r:0,n:0,b:0,q:0} };
  var values  = { p:1, n:3, b:3, r:5, q:9 };
  var symbols = {
    w: { p:'♙', n:'♘', b:'♗', r:'♖', q:'♕' },
    b: { p:'♟', n:'♞', b:'♝', r:'♜', q:'♛' }
  };

  // Count what's still on board
  var board_state = game.board();
  board_state.forEach(function(row) {
    row.forEach(function(sq) {
      if (sq && sq.type !== 'k') onBoard[sq.color][sq.type]++;
    });
  });

  // Calculate captures
  var captured = { w: {}, b: {} };
  var score = { w: 0, b: 0 };
  ['w','b'].forEach(function(color) {
    ['p','r','n','b','q'].forEach(function(type) {
      var count = pieces[color][type] - onBoard[color][type];
      if (count > 0) {
        captured[color][type] = count;
        score[color] += count * values[type];
      }
    });
  });

  // Net advantage
  var diff = score.b - score.w; // pieces white lost = black captured
  var diffOpp = score.w - score.b;

  // Render — opponent's captures show above, player's below
  // "opponent captured white pieces" shows above board
  // "player captured black pieces" shows below board
  var topColor    = playerColor === 'w' ? 'b' : 'w'; // opponent's pieces player captured → show above
  var bottomColor = playerColor === 'w' ? 'w' : 'b'; // player's pieces opponent captured → show below

  function renderBar(elId, capturedPieces, netDiff, pieceColor) {
    var el = document.getElementById(elId);
    var html = '';
    ['q','r','b','n','p'].forEach(function(type) {
      var count = capturedPieces[type] || 0;
      for (var i = 0; i < count; i++) {
        html += '<span style="font-size:16px;opacity:0.85">' + symbols[pieceColor][type] + '</span>';
      }
    });
    if (netDiff > 0) html += '<span style="font-size:11px;color:#888;margin-left:4px;">+' + netDiff + '</span>';
    el.innerHTML = html;
  }

renderBar('pieces-opponent', captured[topColor],    diff > 0 ? diff : 0,    topColor);
renderBar('pieces-player',   captured[bottomColor], diffOpp > 0 ? diffOpp : 0, bottomColor);


}

//  ANALYSIS MODE
// ══════════════════════════════════════════════════════════════
var analysisGame = new Chess();
var analysisBoard = null;

function setAnalysisStatus(msg) {
  document.getElementById('analysis-status').textContent = msg;
}

function initAnalysisBoard() {
  analysisGame = new Chess();
  var selectedAnalysisSquare = null;

  analysisBoard = Chessboard('analysis-board', {
    draggable: true,
    position: 'start',
    pieceTheme: 'img/chesspieces/wikipedia/{piece}.png',
    onDragStart: function(source, piece) { return true; },
    onDrop: function(source, target) {
      var move = analysisGame.move({ from: source, to: target, promotion: 'q' });
      if (move === null) return 'snapback';
      analysisBoard.position(analysisGame.fen());
      setAnalysisStatus('Position updated. Press Analyse or Coach Me.');
      resetCoachCard();
      clearBestMoveHighlight();
      selectedAnalysisSquare = null;
    },
    onSnapEnd: function() { analysisBoard.position(analysisGame.fen()); }
  });

  // Manual click-to-move — use native DOM, not jQuery
  document.getElementById('analysis-board').addEventListener('click', function(e) {
    var squareEl = e.target.closest('[data-square]');
    if (!squareEl) return;
    var square = squareEl.getAttribute('data-square');
    
    var piece = analysisGame.get(square);

    if (selectedAnalysisSquare) {
      var move = analysisGame.move({ from: selectedAnalysisSquare, to: square, promotion: 'q' });
      document.querySelectorAll('#analysis-board [data-square]').forEach(function(el) {
        el.classList.remove('highlight-selected', 'highlight-square', 'highlight-capture');
      });
      selectedAnalysisSquare = null;
      if (move === null) {
        if (piece) {
          selectedAnalysisSquare = square;
          squareEl.classList.add('highlight-selected');
        }
        return;
      }
      analysisBoard.position(analysisGame.fen());
      setAnalysisStatus('Position updated. Press Analyse or Coach Me.');
      resetCoachCard();
      clearBestMoveHighlight();
    } else {
      if (!piece) return;
      selectedAnalysisSquare = square;
      document.querySelectorAll('#analysis-board [data-square]').forEach(function(el) {
        el.classList.remove('highlight-selected');
      });
      squareEl.classList.add('highlight-selected');
    }
  }, true); // <-- true = capture phase, fires before chessboard.js can swallow it
}

function loadFen() {
  if (!analysisBoard) initAnalysisBoard();

  var fen = document.getElementById('fen-input').value.trim();
  if (!fen) {
    analysisGame = new Chess();
    analysisBoard.position('start');
    setAnalysisStatus('Starting position loaded.');
    resetCoachCard();
    updateEvalBar(0);
    return;
  }
  var test = new Chess();
  if (!test.load(fen)) {
    setAnalysisStatus('Invalid FEN — please check and try again.');
    return;
  }
  analysisGame = test;
  analysisBoard.position(fen);
  setAnalysisStatus('Position loaded. Press Analyse or Coach Me.');
  resetCoachCard();
  updateEvalBar(0);
  clearBestMoveHighlight();
}

function analysePosition() {
  if (!analysisBoard) initAnalysisBoard();

  var fen = analysisGame.fen();
  setAnalysisStatus('⏳ Engine analysing...');
  document.getElementById('btn-coach').disabled = true;

  fetch(API_BASE + '/move', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fen: fen, think_time: 2.0 })
  })
  .then(r => r.json())
  .then(data => {
      var from = data.move.slice(0, 2);
      var to   = data.move.slice(2, 4);
      highlightBestMove(from, to);
      updateEvalBar(data.eval_pawns || 0); 
      renderCandidates(data.candidates);
      setAnalysisStatus('Best move: ' + data.move + '  |  Use Coach Me for a full explanation.');
      document.getElementById('btn-coach').disabled = false;
  })
  .catch(() => {
    setAnalysisStatus('Engine error — is the server running?');
    document.getElementById('btn-coach').disabled = false;
  });
}

function getCoaching() {
  if (!analysisBoard) initAnalysisBoard();
  
  var apiKey = document.getElementById('api-key-input').value.trim();
  if (!apiKey) {
    setAnalysisStatus('Enter your API key above to use coaching.');
    return;
  }
  var fen = analysisGame.fen();
  setAnalysisStatus('<span class="spinner"></span> Coach thinking...');
  document.getElementById('analysis-status').innerHTML =
    '<span class="spinner"></span> Coach thinking...';
  document.getElementById('btn-coach').disabled = true;
  resetCoachCard();

  fetch(API_BASE + '/coach', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey
    },
    body: JSON.stringify({ fen: fen, think_time: 2.0 })
  })
  .then(r => r.json())
  .then(data => {
    if (data.detail) {
      setAnalysisStatus('Error: ' + data.detail);
      document.getElementById('btn-coach').disabled = false;
      return;
    }

    // Highlight best move on board
    if (data.best_move) {
      highlightBestMove(data.best_move.slice(0,2), data.best_move.slice(2,4));
    }

    // Update eval bar
    updateEvalBar(data.eval_pawns || 0);

    // Parse coaching text into sections
    parseAndRenderCoaching(data.coaching, data.best_move, data.eval_pawns);

    setAnalysisStatus('Analysis complete.');
    document.getElementById('btn-coach').disabled = false;
  })
  .catch(() => {
    setAnalysisStatus('Coach unavailable — check server and API key.');
    document.getElementById('btn-coach').disabled = false;
  });
}

function parseAndRenderCoaching(text, bestMove, evalPawns) {
  // Extract sections from formatted coach response
  var sections = { assessment: '', bestmove: '', plan: '', tip: '' };

  var assessMatch = text.match(/ASSESSMENT:\s*(.+?)(?=BEST MOVE:|PLAN:|TIP:|$)/si);
  var bestMatch   = text.match(/BEST MOVE:\s*(.+?)(?=PLAN:|TIP:|$)/si);
  var planMatch   = text.match(/PLAN:\s*(.+?)(?=TIP:|$)/si);
  var tipMatch    = text.match(/TIP:\s*(.+?)$/si);

  if (assessMatch) sections.assessment = assessMatch[1].trim();
  if (bestMatch)   sections.bestmove   = bestMatch[1].trim();
  if (planMatch)   sections.plan       = planMatch[1].trim();
  if (tipMatch)    sections.tip        = tipMatch[1].trim();

  // Fallback: show raw text if parsing failed
  if (!sections.assessment && !sections.bestmove) {
    sections.assessment = text;
  }

  // Add eval to assessment
  if (evalPawns !== undefined) {
    var sign = evalPawns >= 0 ? '+' : '';
    var evalStr = ' [Eval: ' + sign + evalPawns + ']';
    sections.assessment = (sections.assessment || '') + evalStr;
  }

  document.getElementById('c-assessment').textContent = sections.assessment || '—';
  document.getElementById('c-bestmove').textContent   = sections.bestmove   || (bestMove || '—');
  document.getElementById('c-plan').textContent       = sections.plan       || '—';
  document.getElementById('c-tip').textContent        = sections.tip        || '—';

  document.getElementById('coach-card').classList.add('visible');
}

function updateEvalBar(evalPawns) {
  // Convert eval to 0-100 range. +5 pawns = ~90%, -5 = ~10%
  var clamped = Math.max(-5, Math.min(5, evalPawns || 0));
  var pct = 50 + (clamped / 5) * 40;
  document.getElementById('eval-bar').style.width = pct + '%';
  var sign = evalPawns >= 0 ? '+' : '';
  document.getElementById('eval-label').textContent =
    'Eval: ' + sign + (evalPawns || 0).toFixed(2);
}

function highlightBestMove(from, to) {
  clearBestMoveHighlight();
  $('#analysis-board .square-' + from).addClass('highlight-best');
  $('#analysis-board .square-' + to).addClass('highlight-best');
}

function clearBestMoveHighlight() {
  $('#analysis-board .square-55d63').removeClass('highlight-best');
}

function resetCoachCard() {
  document.getElementById('coach-card').classList.remove('visible');
  ['c-assessment','c-bestmove','c-plan','c-tip'].forEach(function(id) {
    document.getElementById(id).textContent = '—';
  });
  document.getElementById('eval-label').textContent = '—';
  document.getElementById('eval-bar').style.width = '50%';
}

function resetAnalysis() {
  document.getElementById('fen-input').value = '';
  analysisGame = new Chess();
  if (analysisBoard) analysisBoard.position('start');
  setAnalysisStatus('Paste a FEN and press Load, or click Analyse.');
  resetCoachCard();
  clearBestMoveHighlight();
}

  btn.textContent = 'Please wait...';
  btn.disabled = true;

function buildPGN(chessGame, result) {
  // Rebuild PGN from tracked move history
  var pgn = '';
  moveHistory.forEach(function(san, i) {
    if (i % 2 === 0) pgn += (Math.floor(i/2) + 1) + '. ';

  return pgn.trim();
